type StudyTopic {
  id: ID!
  category: String!
  topic: String!
  title: String!
  summary: String
  bodyMd: String
  deepDive: String
  difficulty: String!
  tags: [String!]!
  createdAt: DateTime!
}

type StudyConceptExplanation {
  id: ID!
  selectedText: String!
  explanation: String!
  createdAt: DateTime!
}

extend type Query {
  studyTopic(category: String!, topic: String!): StudyTopic
  studyTopics(category: String!): [StudyTopic!]!
}

extend type Mutation {
  generateStudyConceptExplanation(
    studyTopicId: ID!
    selectedText: String!
    context: String
  ): StudyConceptExplanation!
  generateStudyDeepDive(
    studyTopicId: ID!
    force: Boolean
  ): StudyTopic!
}
