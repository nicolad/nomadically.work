type SkillProfile {
  id: ID!
  userId: String!
  filename: String
  extractedSkills: [String!]!
  taxonomyVersion: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type MatchedJob {
  job: Job!
  matchedSkills: [String!]!
  missingSkills: [String!]!
  matchScore: Float!
  totalRequired: Int!
  totalMatched: Int!
}

type MatchedJobsResult {
  jobs: [MatchedJob!]!
  totalCount: Int!
  hasMore: Boolean!
}

extend type Mutation {
  # Upload resume (base64 PDF or plain text) and store in D1 for skill matching
  uploadSkillProfile(resumeBase64: String!, filename: String!, fileType: String!): SkillProfile!
  # Run taxonomy-grounded skill extraction on stored resume
  extractSkillProfile(profileId: ID!): SkillProfile!
}

extend type Query {
  # Get the authenticated user's current skill profile
  mySkillProfile: SkillProfile
  # Get ranked job matches for the authenticated user's skill profile
  matchedJobs(limit: Int, offset: Int): MatchedJobsResult!
}
